name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, bcmath, xml
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: |
          cd kechow-server
          composer install --no-interaction --prefer-dist

      - name: Copy env
        run: |
          cd kechow-server
          cp .env.example .env
          php artisan key:generate

      - name: Laravel Pint (lint)
        run: cd kechow-server && ./vendor/bin/pint --test || true

      - name: PHPUnit
        run: cd kechow-server && php artisan test
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kechow-client/package-lock.json

      - name: Install npm dependencies
        run: |
          cd kechow-client
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Lint
        run: cd kechow-client && npm run lint

      - name: Typecheck
        run: cd kechow-client && npm run typecheck

      - name: Build
        run: cd kechow-client && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8000' }}

      - name: Unit tests (Vitest)
        run: cd kechow-client && npm run test || true
